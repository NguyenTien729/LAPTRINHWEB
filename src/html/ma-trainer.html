<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="ma-dashboard.html" class="nav-item">Dashboard</a>
        <a href="ma-profile.html" class="nav-item">Profile</a>
        <a href="ma-registration.html" class="nav-item">Registration</a>
        <a href="ma-package.html" class="nav-item">Package</a>
        <a href="ma-payment.html" class="nav-item">Payment</a>
        <a href="ma-members.html" class="nav-item">View Members</a>
        <a href="ma-trainer.html" class="nav-item active">Trainer</a>
        <a href="ma-report.html" class="nav-item">Report</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>
<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Active Trainer</h2>
    <div class="card table-card">
        <div class="card-header"><h3>Manage Coaches</h3></div>

        <table>
            <thead>
            <tr>
                <th># Name</th><th>Trainer ID</th><th>Contact</th><th>Specialty</th><th>Actions</th>
            </tr>
            </thead>
            <tbody id="trainerTbody"></tbody>
        </table>
    </div>
</main>

<div id="trainerModal" class="modal">
    <div class="modal-content coach-detail-modal">
        <div class="modal-header-row">
            <h2 class="modal-title">Detail: <span id="modalTrainerId">NV004</span></h2>
            <button class="btn-close-x" onclick="app.closeTrainerModal()">X</button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="modalName" readonly>
            </div>
            <div class="modal-grid">
                <div class="input-group">
                    <label>Date of birth:</label>
                    <input type="text" id="modalDob" readonly>
                </div>
                <div class="input-group">
                    <label>Gender:</label>
                    <input type="text" id="modalGender" readonly>
                </div>
            </div>
            <div class="modal-grid">
                <div class="input-group">
                    <label>Contact no.:</label>
                    <input type="text" id="modalContact" readonly>
                </div>
                <div class="input-group">
                    <label>Specialty:</label>
                    <input type="text" id="modalSpecialty" readonly>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/Manager.js"></script>
<script>
    const app = new ManagerApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';

    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;
    window.onload = () => app.loadTrainers('trainerTbody');
</script>
</body>
</html>
