<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="avatar-circle"><img src="" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="rep-profile.html" class="nav-item active">Profile</a>
        <a href="rep-registration.html" class="nav-item">Registration</a>
        <a href="rep-package.html" class="nav-item">Package</a>
        <a href="rep-payment.html" class="nav-item">Payment</a>
        <a href="rep-members.html" class="nav-item">View Members</a>
        <a href="rep-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo" onerror="this.alt='AGym Logo'">
        <h1>AGym</h1>
    </div>

    <h2 class="page-title">Receptionist Information</h2>

    <div class="profile-layout">
        <div class="card info-card">
            <div class="avatar-circle"></div>
            <div class="display-fields">
                <p>MaNV: <span id="displayMasv"></span></p>
                <p>Username: <span id="displayUsername"></span></p>
                <p>Name: <span id="displayName"></span></p>
                <p>Contact no: <span id="displayContact"></span></p>
                <p>Email: <span id="displayEmail"></span></p>
                <p>Date of birth: <span id="displayDob"></span></p>
                <p>Gender: <span id="displayGender"></span></p>
            </div>
        </div>

        <div class="card form-card">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="profileUsername">
            </div>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="profileName">
            </div>
            <div class="input-group">
                <label>Contact No.</label>
                <input type="text" id="profileContact">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="profileEmail">
            </div>
            <div class="input-group">
                <label>dob</label>
                <input type="date" id="profileDob">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="profilePassword">
            </div>

            <button class="btn-save-yellow" onclick="app.saveProfile()">Save</button>
        </div>
    </div>
</main>
<script src="../js/Receptionist.js"></script>
<script>
    const app = new ReceptionistApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';
    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;

    window.onload = () => {
        const staffId = localStorage.getItem('staffId') || 'NV001';
        app.loadProfile(staffId);
    }
</script>
</body>
</html>
