<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Report - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="ma-dashboard.html" class="nav-item">Dashboard</a>
        <a href="ma-profile.html" class="nav-item">Profile</a>
        <a href="ma-registration.html" class="nav-item">Registration</a>
        <a href="ma-package.html" class="nav-item">Package</a>
        <a href="ma-payment.html" class="nav-item">Payment</a>
        <a href="ma-members.html" class="nav-item">View Members</a>
        <a href="ma-trainer.html" class="nav-item">Trainer</a>
        <a href="ma-report.html" class="nav-item active">Report</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Revenue Report</h2>

    <!-- Revenue Calculator Card -->
    <div class="card report-filter-card">
        <div class="filter-grid">
            <div class="input-group">
                <label>From Date</label>
                <input type="date" id="reportFrom">
            </div>
            <div class="input-group">
                <label>To Date</label>
                <input type="date" id="reportTo">
            </div>
            <div class="input-group">
                <button
                        class="btn-primary"
                        onclick="app.loadReport()"
                        style="margin-top:22px">
                        Tính
                </button>
            </div>
            <div class="input-group total-box">
                <label>Total Revenue</label>
                <div class="total-value" id="reportTotal">0 VNĐ</div>
            </div>
        </div>
    </div>
</main>

<script src="../js/Manager.js"></script>
<script>
    const app = new ManagerApp();

    // Set thông tin từ localStorage
    const name = localStorage.getItem('staffName') || 'Admin';
    const email = localStorage.getItem('staffEmail') || '';

    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarEmail').textContent = email;

    // Khi trang load
    window.onload = () => {
        app.setDefaultDates();
        app.loadReport();
    };
</script>
</body>
</html>
