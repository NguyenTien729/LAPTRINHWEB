<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="user-profile">
        <div class="avatar-circle">
            <img src="" alt="Avatar">
        </div>
        <p class="user-name">Trần Thu Hà</p>
        <p class="user-email">lt01@gym.com</p>
    </div>
    <nav class="nav-menu">
        <a href="rep-profile.html" class="nav-item">Profile</a>
        <a href="rep-registration.html" class="nav-item">Registration</a>
        <a href="rep-package.html" class="nav-item">Package</a>
        <a href="rep-payment.html" class="nav-item active">Payment</a>
        <a href="rep-members.html" class="nav-item">View Members</a>
        <a href="rep-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Add Payment</h2>

    <div class="card payment-form">
        <div class="form-grid-three">
            <input type="text" placeholder="Name of Member">
            <select id="packageSelect">
                <option value="">Chọn gói tập</option>
                <option value="500000">1 tháng</option>
                <option value="1200000">3 tháng</option>
                <option value="3000000">6 tháng</option>
                <option value="5000000">1 năm</option> </select>
            <input type="text" id="priceInput" placeholder="Price" readonly>
        </div>
        <div class="form-row-between">
            <input type="date" class="date-input">
            <button id="btnQR" class="btn-purple">Mã thanh toán</button>
        </div>
        <div class="form-actions-right">
            <button class="btn-primary">Save</button>
            <button class="btn-cancel">Cancel</button>
        </div>
    </div>

    <div class="card table-section">
        <h3>Payment</h3>
        <div class="table-tools">
            <label>Show Entities <select><option>4</option></select></label>
            <input type="text" placeholder="Search" class="search-table">
        </div>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Member ID</th>
                <th>Package</th>
                <th>Payment date</th>
                <th>Payment type</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Phạm Thành Đạt</td>
                <td>HV001</td>
                <td>1 tháng</td>
                <td>Mar 01</td>
                <td>Tiền mặt</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div id="qrModal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);">
    <div style="position: relative; margin: 10% auto; padding: 20px; width: 300px; background: white; border-radius: 8px; text-align: center;">
        <span id="closeModal" style="position: absolute; right: 10px; top: 5px; cursor: pointer; font-size: 24px;">&times;</span>
        <h3>Quét mã để thanh toán</h3>
        <img src="assets/QR.jpg" alt="QR Code" style="width: 100%; height: auto; margin-top: 10px;">
    </div>
</div>
</body>
<script>
    const packageSelect = document.getElementById('packageSelect');
    const priceInput = document.getElementById('priceInput');

    packageSelect.addEventListener('change', function() {
        const selectedPrice = this.value;
        if (selectedPrice) {
            const formattedPrice = new Intl.NumberFormat('vi-VN').format(selectedPrice);
            priceInput.value = formattedPrice + " VNĐ";
        } else {
            priceInput.value = "";
        }
    });
    const btnShowQR = document.getElementById('btnQR');
    const qrModal = document.getElementById('qrModal');
    const closeModal = document.getElementById('closeModal');

    btnShowQR.addEventListener('click', function() {
        qrModal.style.display = "block";
    });

    closeModal.addEventListener('click', function() {
        qrModal.style.display = "none";
    });

    window.onclick = function(event) {
        if (event.target == qrModal) {
            qrModal.style.display = "none";
        }
    }
</script>
</html></html>
