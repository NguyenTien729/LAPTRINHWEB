<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="user-profile">
        <div class="avatar-circle">
            <img src="assets/profileWhite.jpg" alt="Avatar">
        </div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="rep-profile.html" class="nav-item">Profile</a>
        <a href="rep-registration.html" class="nav-item">Registration</a>
        <a href="rep-package.html" class="nav-item">Package</a>
        <a href="rep-payment.html" class="nav-item active">Payment</a>
        <a href="rep-members.html" class="nav-item">View Members</a>
        <a href="rep-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Add Payment</h2>
    <div class="card payment-form">
        <div class="form-grid-three">
            <input type="text" id="paymentMember" placeholder="Name of Member">
            <select id="packageSelect" onchange="app.onPackageChange(this, 'priceInput')">
                <option value="">Chọn gói tập</option>
            </select>
            <input type="text" id="priceInput" placeholder="Price" readonly>
        </div>
        <div class="form-grid-three">
            <select id="scheduleSelect" onchange="app.onScheduleChange(this)">
                <option value="">Chọn HLV & Lịch tập</option>
            </select>
            <input type="text" id="timeDisplay" placeholder="Giờ tập" readonly>
            <input type="text" id="daysDisplay" placeholder="Thứ trong tuần" readonly>
        </div>
        <div class="form-grid-three">
            <input type="date" id="paymentDate" class="date-input">
            <select id="paymentMethod" >
                <option value="Tiền mặt">Tiền mặt</option>
                <option value="Chuyển khoản">Chuyển khoản</option>
                <option value="Thẻ">Thẻ</option>
            </select>
        </div>
        <div class="form-actions-right">
            <button class="btn-primary" onclick="app.savePayment()">Save</button>
            <button class="btn-cancel">Cancel</button>
            <button class="btn-purple" onclick="app.showQR()">Mã thanh toán</button>
        </div>
    </div>

    <div class="card table-section">
        <h3>Payment</h3>
        <div class="search-bar">
            <input type="text" id="paymentSearchInput" placeholder="Search by name, ID or date..."
                   onkeypress="if(event.key === 'Enter') app.searchPayment(this.value)">
            <button class="btn-white" onclick="app.searchPayment(document.getElementById('paymentSearchInput').value)">Search</button>
        </div>
        <table>
            <thead>
            <tr>
                <th>Name</th><th>Member ID</th><th>Package</th><th>Payment date</th><th>Payment type</th>
            </tr>
            </thead>
            <tbody id="paymentTbody"></tbody>
        </table>
    </div>
</main>

<div id="qrModal" class="modal" >
    <div style="position:relative; margin:10% auto; padding:20px; width:300px; background:white; border-radius:8px; text-align:center;">
        <span onclick="app.hideQR()" style="position:absolute; right:10px; top:5px; cursor:pointer; font-size:24px;">&times;</span>
        <h3>Quét mã để thanh toán</h3>
        <img src="assets/QR.jpg" alt="QR Code" style="width:100%; height:auto; margin-top:10px;">
    </div>
</div>

<script src="../js/Receptionist.js"></script>
<script>
    const app = new ReceptionistApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';
    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;
    window.onload = () => {
        app.loadPayments();
        app.iniPayment()
    }
</script>
</body>
</html>
