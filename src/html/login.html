<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="login-form">
            <h1>Đăng nhập</h1>
            <div class="input-group">
                <label>Username <span>*</span></label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="input-group">
                <label>Password <span>*</span></label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            <button class="btn-login">Đăng nhập</button>
        </div>
    </div>
    <div class="right-panel">
        <img src="assets\logo_agym.png" alt="AGym Logo" class="logo-img">
    </div>
</div>
</body>
<script>
    document.querySelector('.btn-login').addEventListener('click', async () => {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (!user || !pass) {
            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await response.json();

            if (data.success) {
                // Lưu quyền hạn vào localStorage để dùng cho các trang sau
                localStorage.setItem('token', data.token);
                localStorage.setItem('staffId', data.staffId)
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('staffEmail', data.email);
                localStorage.setItem('staffName', data.name);

                // Chuyển hướng theo chức vụ (Ví dụ: CV01 là Quản lý)
                if (data.role === 'CV00') {
                    window.location.href = 'admin.html';
                } else if(data.role === 'CV01') {
                    window.location.href = 'ma-dashboard.html';
                } else if(data.role === 'CV02') {
                    window.location.href = 'trainer-profile.html';
                }else {
                    window.location.href = 'rep-profile.html';
                }
            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error("Lỗi kết nối:", error);
            alert("Không thể kết nối đến máy chủ!");
        }
    });
</script>
</html>
