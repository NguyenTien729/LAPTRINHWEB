<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="assets/profileWhite.jpg" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="ma-dashboard.html" class="nav-item">Dashboard</a>
        <a href="ma-profile.html" class="nav-item">Profile</a>
        <a href="ma-registration.html" class="nav-item active">Registration</a>
        <a href="ma-package.html" class="nav-item">Package</a>
        <a href="ma-payment.html" class="nav-item">Payment</a>
        <a href="ma-members.html" class="nav-item">View Members</a>
        <a href="ma-trainer.html" class="nav-item">Trainer</a>
        <a href="ma-report.html" class="nav-item">Report</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>
<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Register</h2>
    <div class="card registration-form">
        <div class="form-grid">
            <div class="input-group">
                <label>Name of Participant</label>
                <input type="text" id="regName">
            </div>
            <div class="input-group">
                <label>Date of birth</label>
                <input type="date" id="regDob">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail">
            </div>
            <div class="input-group">
                <label>Gender</label>
                <select id="regGender">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
            </div>
            <div class="input-group">
                <label>Contact No.</label>
                <input type="text" id="regContact">
            </div>


        </div>
        <div class="form-actions">
            <button class="btn-primary" onclick="app.registerMember()">Avail Membership</button>
            <button class="btn-cancel" onclick="document.querySelectorAll('#regName,#regEmail,#regContact').forEach(e=>e.value='')">Cancel</button>
        </div>
    </div>
</main>
<script src="../js/Manager.js"></script>
<script>
    const app = new ManagerApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';

    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;
</script>
</body>
</html>
