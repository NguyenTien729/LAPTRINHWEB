<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="ma-dashboard.html" class="nav-item">Dashboard</a>
        <a href="ma-profile.html" class="nav-item">Profile</a>
        <a href="ma-registration.html" class="nav-item">Registration</a>
        <a href="ma-package.html" class="nav-item active">Package</a>
        <a href="ma-payment.html" class="nav-item">Payment</a>
        <a href="ma-members.html" class="nav-item">View Members</a>
        <a href="ma-trainer.html" class="nav-item">Trainer</a>
        <a href="ma-report.html" class="nav-item">Report</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>
<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Package Plan</h2>

    <!-- Form thêm gói mới -->
    <div class="card package-form-card">
        <div class="form-grid-package">
            <div class="input-group">
                <label>Package Name</label>
                <input type="text" id="newPkgName" placeholder="Nhập tên gói tập">
            </div>
            <div class="input-group">
                <label>Validity (Month)</label>
                <input type="number" id="newPkgValidity" placeholder="Số tháng">
            </div>
            <div class="input-group full-width">
                <label>Amount</label>
                <input type="text" id="newPkgAmount" placeholder="Giá tiền">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-save-yellow" onclick="app.openPackageModal('','','','')">Save</button>
            <button class="btn-cancel">Cancel</button>
        </div>
    </div>

    <!-- Bảng danh sách gói -->
    <div class="card table-card">
        <div class="table-header-tools">

            <div class="search-box-container">
                <input type="text" placeholder="Search" class="table-search">
            </div>
        </div>
        <table>
            <thead>
            <tr>
                <th># Plan Name</th><th>Validity</th><th>Amount</th><th>Edit</th>
            </tr>
            </thead>
            <tbody id="packageTbody"></tbody>
        </table>
    </div>
</main>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 class="modal-title">Edit package: <span id="displayPackageName"></span></h2>
        <div class="modal-body">
            <div class="input-group">
                <label>Plan Name</label>
                <input type="text" id="editPlanName">
            </div>
            <div class="modal-grid">
                <div class="input-group">
                    <label>Validity</label>
                    <input type="number" id="editValidity">
                </div>
                <div class="input-group">
                    <label>Amount</label>
                    <input type="text" id="editAmount">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-delete" onclick="app.deletePackage()">Delete</button>
            <div class="footer-right">
                <button class="btn-cancel" onclick="app.closePackageModal()">Cancel</button>
                <button class="btn-save-changes" onclick="app.savePackage()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/Manager.js"></script>
<script>
    const app = new ManagerApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';

    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;
    window.onload = () => app.loadPackages('packageTbody');
</script>
</body>
</html>
