<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar">
            <img src="assets/profileWhite.jpg" alt="Avatar">
        </div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="rep-profile.html" class="nav-item">Profile</a>
        <a href="rep-registration.html" class="nav-item">Registration</a>
        <a href="rep-package.html" class="nav-item active">Package</a>
        <a href="rep-payment.html" class="nav-item">Payment</a>
        <a href="rep-members.html" class="nav-item">View Members</a>
        <a href="rep-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>

    <h2 class="page-title">Package Plan</h2>

    <div class="card table-card-reception">
        <table class="purple-table">
            <thead>
            <tr>
                <th># Plan Name</th>
                <th>Validity</th>
                <th>Amount</th>
            </thead>
            <tbody id="packageTbody"></tbody>
        </table>
    </div>
</main>

</body>
<script src="../js/Receptionist.js"></script>
<script>
    const app = new ReceptionistApp();

    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';

    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;

    window.onload = () => app.loadPackages('packageTbody');
</script>
</html>
