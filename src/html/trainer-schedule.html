<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<aside class="sidebar">
    <div class="user-profile">
        <div class="avatar-circle">
            <img src="assets/profileWhite.jpg" alt="Avatar">
        </div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="trainer-profile.html" class="nav-item">Profile</a>
        <a href="trainer-schedule.html" class="nav-item active">Schedule</a>
        <a href="trainer-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="../img/logo.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <div class="schedule-filter-container">
        <label for="scheduleSelect" style="font-weight: bold; margin-right: 10px;">Chọn ca dạy:</label>
        <select id="scheduleSelect" class="btn-schedule" style="width: auto; padding: 10px;"
                onchange="app.loadMembersBySchedule(localStorage.getItem('staffId'), this.value)">
            <option value="all">Đang tải ca dạy...</option>
        </select>
    </div>
    <div class="card table-card-purple">
        <table id="memberTable">
            <thead>
            <tr>
                <th># Name</th>
                <th>Member ID</th>
                <th>Date Enrolled</th>
                <th>Date Expiration</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</main>
<div id="memberDetailModal" class="modal">
    <div class="modal-content member-detail-modal">
        <div class="modal-header-row">
            <h2 class="modal-title">Detail: <span id="displayMemberId">HV001</span></h2>
            <button class="btn-close-box" onclick="app.closeMemberModal()">X</button>
        </div>

        <div class="modal-body">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="detailName" class="input-readonly" readonly>
            </div>
            <div class="modal-grid">
                <div class="input-group">
                    <label>Date of birth:</label>
                    <input type="text" id="detailDob" class="input-readonly" readonly>
                </div>
                <div class="input-group">
                    <label>Gender:</label>
                    <input type="text" id="detailGender" class="input-readonly" readonly>
                </div>
            </div>
            <div class="input-group">
                <label>Contact no.:</label>
                <input type="text" id="detailContact" class="input-readonly" readonly>
            </div>
        </div>
    </div>
</div>
<script src="../js/Trainer.js"></script>
<script>
    const app = new TrainerApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';
    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;

    window.onload = () => {
        const staffId = localStorage.getItem('staffId');
        if (staffId) {
            app.initSchedulePage(staffId);
        } else {
            window.location.href = 'login.html';
        }
    };
</script>
</body>
</html>
