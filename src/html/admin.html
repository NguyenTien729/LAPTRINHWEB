<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/admin-style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="" alt="Avatar"></div>
        <p class="user-name">Nguyễn Phú Quý</p>
        <p class="user-email">admin@gym.com</p>
    </div>
    <nav class="nav-menu">
        <a href="admin.html" class="nav-item active">Staff</a>
    </nav>
</aside>

<main class="main-content">
    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>
    <h2 class="page-title">Staff Management</h2>
    <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
        <button class="btn-save-yellow" onclick="admin.openAddModal()">+ Add New Staff</button>
    </div>
    <div class="staff-grid-container" id="staff-grid">
        <div class="card staff-card"></div>
    </div>
</main>

<div id="staffModal" class="modal">
    <div class="modal-content staff-edit-modal">
        <div class="modal-header-row">
            <h2 class="modal-title">Detail: <span id="modalStaffId">NV001</span></h2>
            <button class="btn-close-x" onclick="admin.closeModal()">X</button>
        </div>
        <div class="modal-body">
            <div class="modal-grid">
                <div class="input-group"><label>Name:</label><input type="text" id="editStaffName"></div>
                <div class="input-group"><label>Staff ID:</label><input type="text" id="editStaffIdDisplay" readonly></div>
            </div>
            <div class="modal-grid">
                <div class="input-group"><label>Username:</label><input type="text" id="editUsername"></div>
                <div class="input-group"><label>Password:</label><input type="password" id="editPassword"></div>
            </div>
            <div class="modal-grid">
                <div class="input-group"><label>Date of birth:</label><input type="date" id="editDob"></div>
                <div class="input-group"><label>Gender:</label><input type="text" id="editGender"></div>
            </div>
            <div class="modal-grid">
                <div class="input-group"><label>Contact no.:</label><input type="text" id="editContact"></div>
                <div class="input-group"><label>Email:</label><input type="email" id="editEmail"></div>
            </div>
            <div class="modal-grid">
                <div class="input-group">
                    <label>Role:</label>
                    <select id="editRole">
                        <option value="CV01">Quản lý</option>
                        <option value="CV02">Huấn luyện viên</option>
                        <option value="CV03">Lễ tân</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Status:</label>
                    <select id="editStatus">
                        <option value="Active">Active</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer-centered">
            <button class="btn-save-purple" onclick="admin.handleSubmit()">Save</button>
            <button class="btn-cancel-outline" onclick="admin.closeModal()">Cancel</button>
        </div>
    </div>
</div>
</body>
<script src="../js/Admin.js"></script>
<script>
    const admin = new Admin();
    window.onload = () => admin.renderStaffGrid();
</script>
</html>
