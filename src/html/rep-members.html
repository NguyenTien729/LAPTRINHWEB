<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Information - AGym</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<aside class="sidebar">
    <div class="user-profile">
        <div class="user-avatar"><img src="assets/profileWhite.jpg" alt="Avatar"></div>
        <p class="user-name" id="sidebarName">...</p>
        <p class="user-email" id="sidebarEmail">...</p>
    </div>
    <nav class="nav-menu">
        <a href="rep-profile.html" class="nav-item">Profile</a>
        <a href="rep-registration.html" class="nav-item">Registration</a>
        <a href="rep-package.html" class="nav-item">Package</a>
        <a href="rep-payment.html" class="nav-item">Payment</a>
        <a href="rep-members.html" class="nav-item active">View Members</a>
        <a href="rep-trainer.html" class="nav-item">Trainer</a>
        <a href="login.html" class="nav-item logout">Logout</a>
    </nav>
</aside>

<main class="main-content">

    <div class="header-logo-section">
        <img src="assets/logo_small.png" alt="AGym Logo" class="app-logo">
        <h1>AGym</h1>
    </div>

    <h2 class="page-title">Active Members</h2>

    <div class="card table-card">
        <div class="card-header-purple">
            <h3>Gym Members</h3>
            <div class="search-bar">
                <input type="text" id="memberSearchInput" placeholder="Search by name, ID or date..."
                       onkeypress="if(event.key === 'Enter') app.searchMembers(this.value)">
                <button class="btn-white" onclick="app.searchMembers(document.getElementById('memberSearchInput').value)">Search</button>
            </div>
        </div>

        <table>
            <thead>
            <tr><th># Name</th><th>Member ID</th><th>Date Enrolled</th><th>Date Expiration</th><th>Actions</th></tr>
            </thead>
            <tbody id="memberTbody"></tbody>
        </table>
    </div>
</main>
<div id="memberModal" class="modal">
    <div class="modal-content member-detail-modal">
        <div class="modal-header-row">
            <h2 class="modal-title">Edit: <span id="modalMemberId">HV001</span></h2>
            <button class="btn-close-box" onclick="app.closeMemberModal()">X</button>
        </div>

        <div class="modal-body">
            <div class="input-group">
                <label>Name:</label>
                <input type="text" id="memberFullname" >
            </div>

            <div class="modal-grid">
                <div class="input-group">
                    <label>Date of birth:</label>
                    <input type="text" id="memberDob" >
                </div>
                <div class="input-group">
                    <label>Gender:</label>
                    <input type="text" id="memberGender" >
                </div>
            </div>

            <div class="input-group">
                <label>Contact no.:</label>
                <input type="text" id="memberContact" >
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-delete-rect" onclick="app.deleteMember(document.getElementById('modalMemberId').innerText)">Delete</button>
            <button class="btn-save-changes" onclick="app.u">Save changes</button>
        </div>
    </div>
</div>
<script src="../js/Receptionist.js"></script>
<script>
    const app = new ReceptionistApp();
    const name = localStorage.getItem('staffName') || '';
    const email = localStorage.getItem('staffEmail')   || '';
    document.getElementById('sidebarName').textContent  = name;
    document.getElementById('sidebarEmail').textContent = email;
    window.onload = () => app.loadMembers('memberTbody');
</script>
</body>
</html>
